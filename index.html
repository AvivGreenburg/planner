<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Planner">
<meta name="theme-color" content="#f4f2ee">
<title>Daily Planner</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  :root{
    --ink:#39342d; --muted:#9b948a; --line:#e8e3da; --accent:#7e9b6e;
    --bg:#f5f3ef;
    --routine:#6E8B9E; --routine-bg:#e6ebee;
    --deep:#7E9B6E;    --deep-bg:#e9eee4;
    --admin:#CDA15B;   --admin-bg:#f6eedd;
    --body:#B98A86;    --body-bg:#f1e7e5;
    --break:#B4ABA0;   --break-bg:#edeae6;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:var(--ink);
    background:
      radial-gradient(900px 520px at 8% -8%, rgba(110,139,158,.16), transparent 60%),
      radial-gradient(820px 500px at 100% 2%, rgba(185,138,134,.14), transparent 60%),
      radial-gradient(760px 620px at 50% 116%, rgba(126,155,110,.16), transparent 60%),
      var(--bg);
    min-height:100vh;
    padding:max(12px,env(safe-area-inset-top)) 0 70px;
  }
  .wrap{max-width:540px;margin:0 auto;padding:0 16px;}
  .datenav{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:4px;}
  .navbtn{border:none;background:#fff;border-radius:10px;width:38px;height:38px;font-size:18px;color:#7b756b;cursor:pointer;box-shadow:0 1px 3px rgba(0,0,0,.06);}
  .navbtn:active{background:#f0ede7;}
  .daytitle{text-align:center;flex:1;}
  .daytitle .d1{font-size:20px;font-weight:700;letter-spacing:-.01em;}
  .daytitle .d2{font-size:12.5px;color:var(--muted);}
  .today-btn{display:block;margin:6px auto 0;border:none;background:none;color:var(--accent);font-size:12px;font-weight:600;cursor:pointer;}
  .startrow{text-align:center;font-size:12px;color:var(--muted);margin:8px 0 8px;}
  .startrow input{font:inherit;font-size:12px;font-weight:700;color:var(--ink);border:none;background:#fff;border-radius:6px;padding:2px 6px;width:58px;text-align:center;box-shadow:0 1px 2px rgba(0,0,0,.06);}
  .drivebar{text-align:center;margin-bottom:14px;}
  .drivebtn{border:1px solid #ddd6cb;background:#fff;border-radius:20px;padding:4px 12px;font-size:12px;color:#7b756b;cursor:pointer;font-weight:600;}
  .drivebtn.on{border-color:var(--accent);color:var(--accent);background:#f0f5ec;}

  .label{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin:18px 0 8px;display:flex;justify-content:space-between;}
  .label .cnt{font-weight:600;letter-spacing:0;text-transform:none;}
  .clist{background:rgba(255,255,255,.6);border-radius:12px;padding:6px 8px;}
  .item{display:flex;align-items:flex-start;gap:9px;padding:6px 4px;}
  .item .box{width:19px;height:19px;border:1.7px solid #c5bfb3;border-radius:6px;flex:0 0 auto;cursor:pointer;margin-top:1px;display:flex;align-items:center;justify-content:center;background:#fff;transition:.12s;}
  .item .box svg{width:11px;height:11px;opacity:0;}
  .item.done .box{background:var(--accent);border-color:var(--accent);}
  .item.done .box svg{opacity:1;}
  .item .txt{flex:1;font-size:14px;outline:none;line-height:1.4;word-break:break-word;}
  .item.done .txt{color:var(--muted);text-decoration:line-through;}
  .item.carried .txt:after{content:"carried";font-size:9.5px;color:#b9b2a6;margin-left:7px;vertical-align:middle;background:#efece6;padding:1px 5px;border-radius:8px;text-decoration:none;}
  .item .x{border:none;background:none;color:#d6a3a3;font-size:15px;cursor:pointer;opacity:0;flex:0 0 auto;}
  .item:hover .x{opacity:1;}
  .additem{font-size:13px;color:var(--accent);cursor:pointer;padding:6px 4px;font-weight:600;}
  .divider{height:1px;background:var(--line);margin:20px 0 14px;}
  .plantitle{font-size:14px;font-weight:700;margin-bottom:12px;}
  #plan{position:relative;padding-left:60px;}
  #plan:before{content:"";position:absolute;left:46px;top:6px;bottom:6px;width:2px;border-radius:2px;background:linear-gradient(180deg,var(--routine),var(--body),var(--deep),var(--admin));opacity:.45;}
  .block{position:relative;border-radius:12px;padding:8px 10px;margin-bottom:6px;background:var(--catbg,#fff);box-shadow:0 1px 4px rgba(90,80,110,.08);border-left:4px solid var(--catcolor,#ccc);display:flex;align-items:flex-start;gap:8px;transition:transform .18s cubic-bezier(.2,.8,.2,1),box-shadow .15s;will-change:transform;}
  .block.dragging{box-shadow:0 12px 28px rgba(90,80,110,.28);z-index:30;transition:none;opacity:.97;}
  .block.done{filter:saturate(.45) opacity(.85);}
  .block.done .name{text-decoration:line-through;color:var(--muted);}
  .tick{position:absolute;left:-60px;top:6px;width:46px;text-align:left;font-size:13px;font-weight:700;color:var(--ink);font-variant-numeric:tabular-nums;}
  .dot{position:absolute;left:-18px;top:11px;width:10px;height:10px;border-radius:50%;background:var(--catcolor,#ccc);box-shadow:0 0 0 3px var(--bg);}
  .check{width:21px;height:21px;border:1.7px solid #beb8ab;border-radius:6px;flex:0 0 auto;cursor:pointer;margin-top:1px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.9);transition:.12s;}
  .check svg{width:12px;height:12px;opacity:0;}
  .block.done .check{background:var(--accent);border-color:var(--accent);}
  .block.done .check svg{opacity:1;}
  .bbody{flex:1;min-width:0;}
  .name{font-size:14.5px;font-weight:500;outline:none;line-height:1.25;word-break:break-word;}
  .name:focus{background:rgba(255,255,255,.7);border-radius:4px;}
  .meta{display:flex;align-items:center;gap:8px;margin-top:2px;font-size:11.5px;color:var(--muted);}
  .dur{outline:none;user-select:text;-webkit-user-select:text;}
  .catbtn{border:none;background:rgba(255,255,255,.55);border-radius:20px;padding:1px 8px;font-size:11px;color:#6b665d;cursor:pointer;}
  .grip{flex:0 0 auto;width:32px;align-self:stretch;display:flex;align-items:center;justify-content:center;color:#a8a296;font-size:21px;cursor:grab;touch-action:none;user-select:none;-webkit-user-select:none;margin:-8px 0 -8px -4px;}
  .del{position:absolute;right:6px;top:5px;border:none;background:none;color:#d3a0a0;font-size:16px;cursor:pointer;opacity:.5;transition:.12s;}
  .block:hover .del{opacity:1;}
  .resize{position:absolute;left:50%;transform:translateX(-50%);bottom:0;width:66px;height:15px;cursor:ns-resize;touch-action:none;display:flex;align-items:flex-end;justify-content:center;padding-bottom:2px;}
  .resize:after{content:"";width:34px;height:4px;border-radius:3px;background:rgba(0,0,0,.16);}
  .resize:active:after{background:var(--catcolor,#999);}
  .block{user-select:none;-webkit-user-select:none;}
  .name[contenteditable="true"]{user-select:text;-webkit-user-select:text;cursor:text;background:rgba(255,255,255,.7);border-radius:4px;}
  .name:empty:before{content:"New task";color:#c3bdb3;}
  .stepbtn{border:none;background:#fff;border-radius:7px;width:26px;height:24px;font-size:15px;color:#7b756b;cursor:pointer;box-shadow:0 1px 2px rgba(0,0,0,.06);vertical-align:middle;}
  .stepbtn:active{background:#f0ede7;}
  #startval{font-size:16px;font-weight:700;color:var(--ink);margin:0 9px;font-variant-numeric:tabular-nums;vertical-align:middle;}
  .addbtn{margin-top:8px;font-size:14px;color:var(--accent);background:none;border:none;cursor:pointer;font-weight:600;padding:6px 0;}
  .mini{font-size:14px;color:var(--ink);padding:6px 8px;outline:none;background:rgba(255,255,255,.6);border-radius:12px;min-height:40px;}
  .mini:empty:before{content:attr(data-ph);color:#c3bdb3;}
  .block.anchor{border-left-style:dashed;}
  .block.anchor .name{font-weight:600;}
  .lock{font-size:11px;opacity:.65;margin-right:3px;}
  .evloc{margin-left:2px;}
  .allday{display:flex;flex-direction:column;gap:5px;margin-bottom:6px;}
  .allday .ad{background:#eceef1;border-left:4px solid #8b94a3;border-radius:10px;padding:7px 11px;font-size:12.5px;color:#5a5650;}
  .foot{margin-top:26px;font-size:11px;color:#bdb6ab;text-align:center;}
</style>
</head>
<body>
<div class="wrap">
  <div class="datenav">
    <button class="navbtn" id="prev">‹</button>
    <div class="daytitle"><div class="d1" id="d1">Today</div><div class="d2" id="d2"></div></div>
    <button class="navbtn" id="next">›</button>
  </div>
  <button class="today-btn" id="todayBtn">jump to today</button>
  <div class="startrow">starts <button class="stepbtn" id="startminus">−</button><span id="startval">08:00</span><button class="stepbtn" id="startplus">＋</button> · times flow from here</div>
  <div class="drivebar"><button class="drivebtn" id="drive">☁︎ Connect Drive</button></div>

  <div class="allday" id="allday"></div>

  <div class="label">📥 Dump here</div>
  <div class="mini" id="dump" contenteditable data-ph="paste links / ideas…"></div>

  <div class="label">✅ TODO <span class="cnt" id="goalsCnt"></span></div>
  <div class="clist" id="goals"></div>

  <div class="label">📌 Things to remember <span class="cnt" id="remCnt"></span></div>
  <div class="clist" id="remember"></div>

  <div class="divider"></div>
  <div class="plantitle">🕐 The Plan</div>
  <div id="plan"></div>
  <button class="addbtn" id="add">+ add block</button>
  <button class="addbtn" id="resetday" style="margin-left:16px;color:#b9b2a6;font-weight:500;">↻ reset to default routine</button>

  <div class="divider"></div>
  <div class="label">🏆 Wins / reflections</div>
  <div class="mini" id="wins" contenteditable data-ph="fill in at night…"></div>

  <div class="foot" id="foot">saved on this device</div>
</div>

<script>
const CATS={
  routine:{label:"routine",color:"var(--routine)",bg:"var(--routine-bg)"},
  deep:{label:"deep work",color:"var(--deep)",bg:"var(--deep-bg)"},
  admin:{label:"admin",color:"var(--admin)",bg:"var(--admin-bg)"},
  body:{label:"body",color:"var(--body)",bg:"var(--body-bg)"},
  break:{label:"break",color:"var(--break)",bg:"var(--break-bg)"},
};
const ORDER=["routine","deep","admin","body","break"];
const KEY="aviv-planner-v2";
const PXMIN=1.6, MINH=40;
/* ---- Google Drive ---- */
const CLIENT_ID="956137933872-mumkpho57vt0fspuluj8ahq9p6vf90gt.apps.googleusercontent.com";
const SCOPE="https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/calendar.readonly"; // own files + read-only calendar
let token=null, tokenClient=null, connected=false, pendingResolve=null;
let folderId=localStorage.getItem("plannerFolderId");if(folderId==="undefined"||folderId==="null"||!folderId)folderId=null;

const DEFAULTS=()=>[
  {cat:"routine",name:"Wake up",dur:15},
  {cat:"body",name:"Yoga",dur:40},
  {cat:"body",name:"Meditation",dur:5},
  {cat:"routine",name:"Shower + dress",dur:20},
  {cat:"routine",name:"House shit",dur:20},
  {cat:"admin",name:"Coffee + admin",dur:25},
  {cat:"deep",name:"Deep work 1",dur:90},
  {cat:"break",name:"Break",dur:15},
  {cat:"deep",name:"Deep work 2",dur:90},
  {cat:"body",name:"Go outside",dur:60},
  {cat:"admin",name:"Coffee + admin (round 2)",dur:20},
].map(b=>({...b,done:false,id:rid()}));

let store=loadStore();
let cur=isoDate(new Date());
let day;

function loadStore(){try{const s=JSON.parse(localStorage.getItem(KEY));if(s&&s.days)return s;}catch(e){}return {days:{}};}
function saveLocal(){store.days[cur]=stripMeta(day);localStorage.setItem(KEY,JSON.stringify(store));}
function stripMeta(o){const c=JSON.parse(JSON.stringify(o));delete c.__fileId;return c;}
function rid(){return Math.random().toString(36).slice(2,9);}
function isoDate(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function shiftDate(iso,n){const d=new Date(iso+"T12:00:00");d.setDate(d.getDate()+n);return isoDate(d);}
let ft;function flash(){const f=document.getElementById("foot");f.textContent=connected?"saved ✓ · synced to Drive":"saved ✓ · this device";clearTimeout(ft);ft=setTimeout(()=>f.textContent=connected?"synced to Drive ☁︎":"saved on this device",1300);}

const toMin=s=>{const m=String(s).match(/(\d{1,2}):?(\d{2})/);return m?(+m[1])*60+(+m[2]):480;};
const fmt=m=>String(Math.floor(m/60)%24).padStart(2,"0")+":"+String(((m%60)+60)%60).padStart(2,"0");
const parseDur=s=>{const m=String(s).match(/(\d+)/);return m?+m[1]:0;};

/* ---------- day building ---------- */
function carry(arr){return (arr||[]).filter(i=>!i.done).map(i=>({id:rid(),text:i.text,done:false,carried:true}));}
function buildDay(iso,prev){
  return {start:prev?prev.start:"08:00",blocks:DEFAULTS(),goals:prev?carry(prev.goals):[],remember:prev?carry(prev.remember):[],dump:"",wins:""};
}
function getDayLocal(iso){
  if(store.days[iso]) return store.days[iso];
  const priors=Object.keys(store.days).filter(k=>k<iso).sort();
  const prev=priors.length?store.days[priors[priors.length-1]]:null;
  const d=buildDay(iso,prev);store.days[iso]=d;localStorage.setItem(KEY,JSON.stringify(store));return d;
}

/* ---------- Drive ---------- */
function setDriveUI(){const b=document.getElementById("drive");b.textContent=connected?"☁︎ Drive synced":"☁︎ Connect Drive";b.classList.toggle("on",connected);}
function initGIS(){
  if(!(window.google&&google.accounts&&google.accounts.oauth2)){return setTimeout(initGIS,300);}
  tokenClient=google.accounts.oauth2.initTokenClient({client_id:CLIENT_ID,scope:SCOPE,
    callback:async r=>{
      if(r&&r.access_token){
        token=r.access_token;connected=true;localStorage.setItem("driveOn","1");setDriveUI();
        if(pendingResolve){const f=pendingResolve;pendingResolve=null;f(true);return;}
        try{await ensureFolder();await migrateDefaults();}catch(e){} openDate(cur);
      } else if(pendingResolve){const f=pendingResolve;pendingResolve=null;f(false);}
    }});
  if(localStorage.getItem("driveOn")==="1"){try{tokenClient.requestAccessToken({prompt:""});}catch(e){}}
}
function connectDrive(){if(tokenClient)tokenClient.requestAccessToken({prompt:connected?"":"consent"});else initGIS();}
function refreshToken(){return new Promise((res,rej)=>{if(!tokenClient)return rej(new Error("no client"));pendingResolve=res;try{tokenClient.requestAccessToken({prompt:""});}catch(e){pendingResolve=null;rej(e);}setTimeout(()=>{if(pendingResolve){pendingResolve=null;rej(new Error("refresh timeout"));}},9000);});}
setInterval(()=>{if(connected)refreshToken().catch(()=>{});},50*60*1000);
async function dapi(url,opts,_retry){opts=opts||{};opts.headers=Object.assign({},opts.headers||{},{Authorization:"Bearer "+token});const r=await fetch(url,opts);
  if(r.status===401){
    if(!_retry){try{await refreshToken();return await dapi(url,opts,true);}catch(e){}}
    connected=false;token=null;localStorage.removeItem("driveOn");setDriveUI();throw new Error("401 auth expired");
  }
  if(!r.ok){let t="";try{t=await r.text();}catch(e){}throw new Error("HTTP "+r.status+" "+t.slice(0,200));}return r;}
async function ensureFolder(){
  if(folderId) return folderId;
  const q=encodeURIComponent("mimeType='application/vnd.google-apps.folder' and name='Daily Planner' and trashed=false");
  const r=await dapi("https://www.googleapis.com/drive/v3/files?q="+q+"&fields=files(id)&spaces=drive");const j=await r.json();
  if(j.files&&j.files[0]){folderId=j.files[0].id;}
  else{const r2=await dapi("https://www.googleapis.com/drive/v3/files?fields=id",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({name:"Daily Planner",mimeType:"application/vnd.google-apps.folder"})});const j2=await r2.json();folderId=j2.id;}
  if(!folderId){throw new Error("folder create failed");}
  localStorage.setItem("plannerFolderId",folderId);return folderId;
}
async function driveFind(date){if(!folderId)await ensureFolder();const q=encodeURIComponent("name='plan-"+date+".json' and '"+folderId+"' in parents and trashed=false");const r=await dapi("https://www.googleapis.com/drive/v3/files?q="+q+"&fields=files(id,name)&spaces=drive");const j=await r.json();return (j.files&&j.files[0])?j.files[0].id:null;}
async function driveRead(date){const id=await driveFind(date);if(!id)return null;const r=await dapi("https://www.googleapis.com/drive/v3/files/"+id+"?alt=media");const d=await r.json();d.__fileId=id;return d;}
async function driveWrite(date,obj){
  const body=JSON.stringify(stripMeta(obj));
  let id=obj.__fileId||await driveFind(date);
  if(id){await dapi("https://www.googleapis.com/upload/drive/v3/files/"+id+"?uploadType=media",{method:"PATCH",headers:{"Content-Type":"application/json"},body});}
  else{if(!folderId)await ensureFolder();const meta={name:"plan-"+date+".json",parents:[folderId]};const b="bnd"+Date.now();
    const multipart="--"+b+"\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n"+JSON.stringify(meta)+"\r\n--"+b+"\r\nContent-Type: application/json\r\n\r\n"+body+"\r\n--"+b+"--";
    const r=await dapi("https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id",{method:"POST",headers:{"Content-Type":"multipart/related; boundary="+b},body:multipart});
    const j=await r.json();obj.__fileId=j.id;}
}
async function driveLatestPrior(date){
  if(!folderId)await ensureFolder();
  const q=encodeURIComponent("'"+folderId+"' in parents and trashed=false and name contains 'plan-'");
  const r=await dapi("https://www.googleapis.com/drive/v3/files?q="+q+"&fields=files(name)&pageSize=1000");
  const j=await r.json();
  const ds=(j.files||[]).map(f=>(f.name.match(/plan-(\d{4}-\d{2}-\d{2})\.json/)||[])[1]).filter(s=>s&&s<date).sort();
  return ds.length?ds[ds.length-1]:null;
}
async function migrateDefaults(){
  if(localStorage.getItem("migDefaultsV2")==="1")return;
  const OLD=["Dishes + laundry (podcast)","Shower + dressed","Yoga","Meditation","Coffee + admin (WhatsApp + email)","Deep work 1","Break","Deep work 2","Go outside","Coffee + admin (round 2)"];
  try{
    if(!folderId)await ensureFolder();
    const q=encodeURIComponent("'"+folderId+"' in parents and trashed=false and name contains 'plan-'");
    const r=await dapi("https://www.googleapis.com/drive/v3/files?q="+q+"&fields=files(id,name)&pageSize=1000");const j=await r.json();
    for(const f of (j.files||[])){
      try{
        const rr=await dapi("https://www.googleapis.com/drive/v3/files/"+f.id+"?alt=media");const d=await rr.json();
        const flex=(d.blocks||[]).filter(b=>!b.anchor);
        const names=flex.map(b=>b.name);
        const isOld=names.length===OLD.length && names.every((n,i)=>n===OLD[i]) && flex.every(b=>!b.done);
        if(isOld){const anchors=(d.blocks||[]).filter(b=>b.anchor);d.blocks=DEFAULTS().concat(anchors);
          await dapi("https://www.googleapis.com/upload/drive/v3/files/"+f.id+"?uploadType=media",{method:"PATCH",headers:{"Content-Type":"application/json"},body:JSON.stringify(d)});}
      }catch(e){}
    }
    localStorage.setItem("migDefaultsV2","1");
  }catch(e){}
}
async function syncCalendar(iso){
  const ds=new Date(iso+"T00:00:00"), de=new Date(iso+"T23:59:59");
  const url="https://www.googleapis.com/calendar/v3/calendars/primary/events?singleEvents=true&orderBy=startTime&maxResults=50&timeMin="+encodeURIComponent(ds.toISOString())+"&timeMax="+encodeURIComponent(de.toISOString());
  const r=await dapi(url);const j=await r.json();
  const anchors=[],allday=[];
  (j.items||[]).forEach(ev=>{
    if(ev.status==="cancelled")return;
    const me=(ev.attendees||[]).find(a=>a.self);if(me&&me.responseStatus==="declined")return;
    if(ev.start&&ev.start.date&&!ev.start.dateTime){if(ev.summary)allday.push(ev.summary);return;}
    if(ev.start&&ev.start.dateTime&&ev.end&&ev.end.dateTime){
      const s=new Date(ev.start.dateTime),e=new Date(ev.end.dateTime);
      const at=String(s.getHours()).padStart(2,"0")+":"+String(s.getMinutes()).padStart(2,"0");
      const dur=Math.max(5,Math.round((e-s)/60000));
      anchors.push({id:"ev"+(ev.id||"").slice(-10),anchor:true,name:ev.summary||"(busy)",at,dur,done:false,eventId:ev.id,location:ev.location||""});
    }
  });
  return {anchors,allday};
}
let dst;function scheduleDriveSave(){clearTimeout(dst);dst=setTimeout(()=>{driveWrite(cur,day).then(()=>{const f=document.getElementById("foot");f.textContent="synced to Drive ☁︎";}).catch(e=>{const f=document.getElementById("foot");f.textContent="⚠️ "+(e&&e.message?e.message:"save failed");});},1200);}

function save(){saveLocal();if(connected)scheduleDriveSave();flash();}

/* ---------- open a date (Drive-aware) ---------- */
async function openDate(iso){
  cur=iso;
  day=getDayLocal(iso);renderAll();          // instant from local cache
  if(!connected)return;
  try{
    let d=await driveRead(iso);
    if(!d){const prior=await driveLatestPrior(iso);const prev=prior?await driveRead(prior):null;d=buildDay(iso,prev);await driveWrite(iso,d);}
    if(cur!==iso)return;                      // user already switched days
    day=d;
    try{const cal=await syncCalendar(iso);if(cal){day.blocks=day.blocks.filter(b=>!b.anchor).concat(cal.anchors);day.allday=cal.allday;driveWrite(iso,day).catch(()=>{});}}catch(e){const f=document.getElementById("foot");if(f)f.textContent="⚠️ "+(e&&e.message?e.message:"calendar sync failed");}
    if(cur!==iso)return;
    saveLocal();renderAll();
  }catch(e){const f=document.getElementById("foot");if(f)f.textContent="⚠️ "+(e&&e.message?e.message:"read failed");}
}

function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

/* ---------- header ---------- */
function renderHeader(){
  const d=new Date(cur+"T12:00:00");
  const days=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
  const mon=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  const isToday=cur===isoDate(new Date());
  document.getElementById("d1").textContent=(isToday?"Today · ":"")+days[d.getDay()];
  document.getElementById("d2").textContent=mon[d.getMonth()]+" "+d.getDate()+", "+d.getFullYear();
  document.getElementById("todayBtn").style.visibility=isToday?"hidden":"visible";
  document.getElementById("startval").textContent=day.start;
}
/* ---------- checklists ---------- */
function renderList(key){
  const host=document.getElementById(key);const arr=day[key];host.innerHTML="";
  arr.forEach(it=>{
    const row=document.createElement("div");
    row.className="item"+(it.done?" done":"")+(it.carried&&!it.done?" carried":"");
    row.dataset.id=it.id;
    row.innerHTML='<div class="box" data-act="box"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4L19 7"/></svg></div><div class="txt" contenteditable data-act="txt">'+esc(it.text)+'</div><button class="x" data-act="x">×</button>';
    host.appendChild(row);
  });
  const add=document.createElement("div");add.className="additem";add.textContent="+ add";
  add.onclick=()=>{arr.push({id:rid(),text:"",done:false});renderList(key);updateCounts();const last=host.querySelector(".item:last-of-type .txt");last&&last.focus();};
  host.appendChild(add);
  host.onclick=e=>{
    const t=e.target.closest("[data-act]");if(!t)return;const row=e.target.closest(".item");if(!row)return;
    const it=arr.find(x=>x.id===row.dataset.id);
    if(t.dataset.act==="box"){it.done=!it.done;it.carried=false;renderList(key);updateCounts();save();}
    if(t.dataset.act==="x"){arr.splice(arr.indexOf(it),1);renderList(key);updateCounts();save();}
  };
}
function setupListBlur(key){
  document.getElementById(key).addEventListener("blur",e=>{
    const t=e.target.closest('[data-act="txt"]');if(!t)return;const row=e.target.closest(".item");const arr=day[key];const it=arr.find(x=>x.id===row.dataset.id);
    if(it){it.text=t.textContent.trim();if(!it.text){arr.splice(arr.indexOf(it),1);renderList(key);}updateCounts();save();}
  },true);
}
function updateCounts(){
  document.getElementById("goalsCnt").textContent=day.goals.filter(i=>!i.done).length?day.goals.filter(i=>!i.done).length+" open":"";
  document.getElementById("remCnt").textContent=day.remember.filter(i=>!i.done).length?day.remember.filter(i=>!i.done).length+" open":"";
}
/* ---------- plan ---------- */
function blockHeight(dur){return Math.max(MINH,Math.round(dur*PXMIN));}
// place fixed anchors at their real time; flow flexible blocks around them (auto-resolve, no overlap)
function computeSchedule(blocks,startStr){
  const rem=blocks.filter(b=>b.anchor).map(b=>({b,at:toMin(b.at)})).sort((x,y)=>x.at-y.at);
  const flex=blocks.filter(b=>!b.anchor);
  const placed=[];let t=toMin(startStr);
  const popDue=()=>{let i;while((i=rem.findIndex(a=>a.at<=t))>=0){const a=rem.splice(i,1)[0];placed.push({b:a.b,start:a.at});t=Math.max(t,a.at+a.b.dur);}};
  for(const fb of flex){let g=0;
    while(g++<400){
      popDue();
      const next=rem.filter(a=>a.at>t).sort((x,y)=>x.at-y.at)[0];
      if(next && t+fb.dur>next.at){rem.splice(rem.indexOf(next),1);placed.push({b:next.b,start:next.at});t=Math.max(t,next.at+next.b.dur);continue;}
      placed.push({b:fb,start:t});t+=fb.dur;break;
    }
  }
  rem.sort((x,y)=>x.at-y.at).forEach(a=>placed.push({b:a.b,start:a.at}));
  placed.sort((x,y)=>x.start-y.start);
  return placed;
}
function renderPlan(){
  const plan=document.getElementById("plan");plan.innerHTML="";
  const CHK='<div class="check" data-act="check"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4L19 7"/></svg></div>';
  computeSchedule(day.blocks,day.start).forEach(({b,start})=>{
    const el=document.createElement("div");el.dataset.id=b.id;el.style.height=blockHeight(b.dur)+"px";
    if(b.anchor){
      el.className="block anchor"+(b.done?" done":"");
      el.style.setProperty("--catcolor","#8b94a3");el.style.setProperty("--catbg","#eceef1");
      el.innerHTML='<span class="tick">'+fmt(start)+'</span><span class="dot"></span>'+CHK+'<div class="bbody"><div class="name"><span class="lock">🔒</span>'+esc(b.name)+'</div><div class="meta"><span>'+fmt(start)+'–'+fmt(start+b.dur)+'</span>'+(b.location?'<span class="evloc">· 📍'+esc(b.location)+'</span>':'')+'</div></div><button class="del" data-act="del">×</button>';
    } else {
      const c=CATS[b.cat]||CATS.deep;
      el.className="block"+(b.done?" done":"");
      el.style.setProperty("--catcolor",c.color);el.style.setProperty("--catbg",c.bg);
      el.innerHTML='<span class="tick">'+fmt(start)+'</span><span class="dot"></span><div class="grip" data-act="grip">⠿</div>'+CHK+'<div class="bbody"><div class="name" data-act="name">'+esc(b.name)+'</div><div class="meta"><span class="dur" contenteditable data-act="dur">'+b.dur+'m</span><button class="catbtn" data-act="cat">'+c.label+'</button></div></div><button class="del" data-act="del">×</button><div class="resize" data-act="resize"></div>';
    }
    plan.appendChild(el);
  });
}
function idx(id){return day.blocks.findIndex(b=>b.id===id);}
const plan=document.getElementById("plan");
let suppressClick=false;
function placeCaretEnd(node){try{const r=document.createRange();r.selectNodeContents(node);r.collapse(false);const s=getSelection();s.removeAllRanges();s.addRange(r);}catch(e){}}

plan.addEventListener("click",e=>{
  if(suppressClick)return;
  const t=e.target.closest("[data-act]");if(!t)return;if(t.dataset.act==="resize")return;
  const el=e.target.closest(".block");const b=el&&day.blocks[idx(el.dataset.id)];if(!b)return;
  if(t.dataset.act==="check"){b.done=!b.done;el.classList.toggle("done");save();}
  else if(t.dataset.act==="del"){day.blocks.splice(idx(el.dataset.id),1);renderPlan();save();}
  else if(t.dataset.act==="cat"){b.cat=ORDER[(ORDER.indexOf(b.cat)+1)%ORDER.length];renderPlan();save();}
  else if(t.dataset.act==="name"&&!b.anchor){if(t.getAttribute("contenteditable")!=="true"){t.setAttribute("contenteditable","true");t.focus();placeCaretEnd(t);}}
});
plan.addEventListener("blur",e=>{
  const t=e.target.closest("[data-act]");if(!t)return;const el=e.target.closest(".block");const b=el&&day.blocks[idx(el.dataset.id)];if(!b)return;
  if(t.dataset.act==="name"){b.name=t.textContent.trim();t.setAttribute("contenteditable","false");save();}
  if(t.dataset.act==="dur"){b.dur=Math.max(5,parseDur(t.textContent));renderPlan();save();}
},true);
plan.addEventListener("keydown",e=>{const a=e.target.dataset&&e.target.dataset.act;if((a==="dur"||a==="name")&&e.key==="Enter"){e.preventDefault();e.target.blur();}});
document.getElementById("add").onclick=()=>{day.blocks.push({cat:"deep",name:"",dur:30,done:false,id:rid()});renderPlan();save();const n=[...plan.querySelectorAll('.block .name')].pop();if(n){n.setAttribute("contenteditable","true");n.focus();}};
document.getElementById("resetday").onclick=()=>{if(!confirm("Replace this day's routine blocks with the default? (keeps appointments, TODO and notes)"))return;const anchors=day.blocks.filter(b=>b.anchor);day.blocks=DEFAULTS().concat(anchors);renderPlan();save();};

/* long-press anywhere = drag reorder (flexible only); quick tap = controls / edit */
let press=null;
// dedicated handle: starts a drag immediately, on any pointer (the reliable mobile path)
plan.addEventListener("pointerdown",e=>{
  const g=e.target.closest('[data-act="grip"]');if(!g)return;e.preventDefault();
  const el=e.target.closest(".block");if(!el)return;const b=day.blocks[idx(el.dataset.id)];if(!b||b.anchor)return;
  press={el,x:e.clientX,y:e.clientY,pid:e.pointerId,dragging:false};startDrag();
});
// long-press anywhere: desktop (mouse) only — on touch the same gesture fights scrolling
plan.addEventListener("pointerdown",e=>{
  if(e.button&&e.button!==0)return;
  if(e.pointerType==="touch")return;
  if(e.target.closest('[data-act="grip"],[data-act="resize"],[data-act="check"],[data-act="del"],[data-act="cat"],[data-act="dur"]'))return;
  const el=e.target.closest(".block");if(!el)return;
  const b=day.blocks[idx(el.dataset.id)];if(!b||b.anchor)return;
  const nm=e.target.closest('[data-act="name"]');if(nm&&nm.getAttribute("contenteditable")==="true")return;
  press={el,x:e.clientX,y:e.clientY,pid:e.pointerId,dragging:false};
  press.timer=setTimeout(startDrag,200);
});
// block the page from scrolling while a drag is active (iOS needs a non-passive touchmove)
document.addEventListener("touchmove",e=>{if(press&&press.dragging)e.preventDefault();},{passive:false});
function startDrag(){
  if(!press)return;press.dragging=true;
  const el=press.el;el.classList.add("dragging");
  press.els=[...plan.querySelectorAll(".block")];press.rects=press.els.map(x=>x.getBoundingClientRect());
  press.from=press.els.indexOf(el);press.to=press.from;press.h=el.getBoundingClientRect().height+6;
  try{el.setPointerCapture(press.pid);}catch(e){}
  if(navigator.vibrate){try{navigator.vibrate(8);}catch(e){}}
}
plan.addEventListener("pointermove",e=>{
  if(!press)return;
  if(!press.dragging){if(Math.abs(e.clientX-press.x)>10||Math.abs(e.clientY-press.y)>10){clearTimeout(press.timer);press=null;}return;}
  e.preventDefault();
  const dy=e.clientY-press.y;press.el.style.transform="translateY("+dy+"px)";
  const center=press.rects[press.from].top+press.rects[press.from].height/2+dy;let to=0;
  press.rects.forEach((r,i)=>{if(i!==press.from&&r.top+r.height/2<center)to++;});press.to=to;
  press.els.forEach((x,i)=>{if(i===press.from)return;let s=0;if(press.from<to&&i>press.from&&i<=to)s=-press.h;else if(press.from>to&&i>=to&&i<press.from)s=press.h;x.style.transform=s?"translateY("+s+"px)":"";});
});
function endPress(){
  if(!press)return;clearTimeout(press.timer);
  if(press.dragging){
    press.els.forEach(x=>x.style.transform="");press.el.classList.remove("dragging");
    const arr=press.els.map(x=>x.dataset.id);const [m]=arr.splice(press.from,1);arr.splice(press.to,0,m);
    const byId={};day.blocks.forEach(b=>byId[b.id]=b);
    const newFlex=arr.map(id=>byId[id]).filter(b=>b&&!b.anchor);const anchors=day.blocks.filter(b=>b.anchor);
    day.blocks=[...newFlex,...anchors];renderPlan();save();
    suppressClick=true;setTimeout(()=>suppressClick=false,60);
  }
  press=null;
}
plan.addEventListener("pointerup",endPress);
plan.addEventListener("pointercancel",endPress);

/* duration resize (bottom-center handle only) */
let rez=null;
plan.addEventListener("pointerdown",e=>{
  const h=e.target.closest('[data-act="resize"]');if(!h)return;e.preventDefault();
  const el=e.target.closest(".block");const b=day.blocks[idx(el.dataset.id)];rez={el,b,startY:e.clientY,startDur:b.dur};try{h.setPointerCapture(e.pointerId);}catch(x){}
},true);
plan.addEventListener("pointermove",e=>{
  if(!rez)return;e.preventDefault();let nd=Math.round((rez.startDur+(e.clientY-rez.startY)/PXMIN)/5)*5;nd=Math.max(5,Math.min(600,nd));
  rez.b.dur=nd;rez.el.style.height=blockHeight(nd)+"px";const du=rez.el.querySelector(".dur");if(du)du.textContent=nd+"m";
  const sm={};computeSchedule(day.blocks,day.start).forEach(({b,start})=>sm[b.id]=start);
  [...plan.querySelectorAll(".block")].forEach(el=>{const s=sm[el.dataset.id];if(s!=null){const tk=el.querySelector(".tick");if(tk)tk.textContent=fmt(s);}});
});
plan.addEventListener("pointerup",()=>{if(rez){rez=null;renderPlan();save();}});

/* editors */
document.getElementById("startminus").onclick=()=>{day.start=fmt(Math.max(0,toMin(day.start)-5));document.getElementById("startval").textContent=day.start;renderPlan();save();};
document.getElementById("startplus").onclick=()=>{day.start=fmt(toMin(day.start)+5);document.getElementById("startval").textContent=day.start;renderPlan();save();};
document.getElementById("dump").addEventListener("blur",e=>{day.dump=e.target.textContent.trim();save();});
document.getElementById("wins").addEventListener("blur",e=>{day.wins=e.target.textContent.trim();save();});
document.getElementById("drive").addEventListener("click",connectDrive);
document.getElementById("prev").onclick=()=>openDate(shiftDate(cur,-1));
document.getElementById("next").onclick=()=>openDate(shiftDate(cur,1));
document.getElementById("todayBtn").onclick=()=>openDate(isoDate(new Date()));

function renderAll(){
  renderHeader();
  const ad=document.getElementById("allday");ad.innerHTML="";(day.allday||[]).forEach(s=>{const d=document.createElement("div");d.className="ad";d.textContent="🗓 "+s;ad.appendChild(d);});
  document.getElementById("dump").textContent=day.dump||"";
  document.getElementById("wins").textContent=day.wins||"";
  renderList("goals");renderList("remember");updateCounts();renderPlan();
}
setupListBlur("goals");setupListBlur("remember");
day=getDayLocal(cur);   // instant local render
renderAll();
initGIS();              // then connect to Drive if previously authorized
</script>
